name: Health Check & Monitoring

on:
  schedule:
    - cron: '*/30 * * * *'  # Every 30 minutes
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest
    
    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true
      
      - name: Check Backend Health
        continue-on-error: true
        run: |
          curl -s -I https://srv988392.hstgr.cloud/health \
            -w "\n\n[HTTP Status] %{http_code}\n[Response Time] %{time_total}s\n" \
            -o /dev/null
      
      - name: Check Docker Containers
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no \
              ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOF'
          
          cd ${{ secrets.VPS_DEPLOYMENT_PATH }}
          
          echo "🐳 Docker Container Status:"
          docker ps -a | grep unified-portal-backend
          
          echo ""
          echo "📊 Container Resource Usage:"
          docker stats --no-stream --format "table {{.Container}}\t{{.CPUPerc}}\t{{.MemUsage}}" unified-portal-backend || true
          
          echo ""
          echo "📋 Recent Logs (Last 20 lines):"
          docker-compose logs backend --tail=20 || true
          
          EOF
      
      - name: Cleanup SSH key
        if: always()
        run: |
          rm -f ~/.ssh/id_rsa
          rm -f ~/.ssh/known_hosts
      
      - name: Report Results
        if: always()
        run: |
          echo "✅ Health check completed at $(date)"
