services:
  backend:
    build: .
    container_name: unified-portal-backend
    restart: unless-stopped

    env_file:
      - .env   # 🔥 sabse important fix

    ports:
      - "5050:5050"

    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads

    networks:
      - app-network

    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5050')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  app-network:
    driver: bridge